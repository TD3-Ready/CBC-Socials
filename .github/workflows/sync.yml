name: Sync CBC data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [calendar-changed]

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull calendar events
        env:
          GOOGLE_CAL_API_KEY: ${{ secrets.GOOGLE_CAL_API_KEY }}
          GOOGLE_CAL_ID: ${{ secrets.GOOGLE_CAL_ID }}
        run: python scripts/sync_calendar.py

      - name: Commit if changed
        run: |
          git config user.name  "cbc-sync-bot"
          git config user.email "cbc-sync-bot@users.noreply.github.com"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "sync: calendar @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
