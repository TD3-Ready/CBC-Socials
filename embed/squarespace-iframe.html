<!--
  CBC Calendar — Squarespace iframe (paste-once, automated forever)
  ─────────────────────────────────────────────────────────────────
  Replace your existing Code Block on the Calendar page with this version.
  This adds parent→iframe viewport messaging so modals always center in
  your visible screen area instead of in the middle of the (taller) iframe.

  Live URL: https://cbc-socials.vercel.app
  After this paste, you never need to touch Squarespace again.
-->

<div id="cbc-calendar-frame" style="width:100%; max-width:1180px; margin:0 auto;">
  <iframe
    id="cbc-cal-iframe"
    src="https://cbc-socials.vercel.app"
    style="width:100%; height:1400px; border:0; display:block; background:#FAF8F2;"
    title="CBC Calendar"
    loading="lazy"
  ></iframe>
</div>

<script>
(function () {
  var iframe = document.getElementById('cbc-cal-iframe');
  if (!iframe) return;

  function sendViewport() {
    if (!iframe.contentWindow) return;
    var rect = iframe.getBoundingClientRect();
    iframe.contentWindow.postMessage({
      type: 'cbc-cal-viewport',
      iframeTop: rect.top,
      viewportHeight: window.innerHeight
    }, '*');
  }

  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === 'cbc-cal-resize' && typeof d.height === 'number') {
      iframe.style.height = Math.max(600, Math.ceil(d.height) + 12) + 'px';
      sendViewport();
    } else if (d.type === 'cbc-cal-request-viewport') {
      sendViewport();
    }
  });

  window.addEventListener('scroll', sendViewport, { passive: true });
  window.addEventListener('resize', sendViewport);
  iframe.addEventListener('load', sendViewport);
  setTimeout(sendViewport, 600);
})();
</script>
